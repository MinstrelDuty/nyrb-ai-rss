name: 🧪 提示词沙盒测试 (Prompt Tester)

on:
  workflow_dispatch: # 🚀 关键魔法：这代表它只能被“手动点击”触发，绝不自动运行

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 测试脚本不需要 feedgen 等复杂库，装这三个核心的就行
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai

      - name: Run prompt tester script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python prompt_tester.py

      - name: Commit test result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 仅将生成的测试结果文件推送到仓库
          git add test_result.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新提示词测试结果" && git push)
