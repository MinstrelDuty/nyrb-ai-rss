name: 🧪 TLS 云端炼丹炉测试

# 只允许手动点击触发
on:
  workflow_dispatch:

jobs:
  test_tls:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装必需的库
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai markdown

      - name: 运行炼丹炉脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python tls_tester.py
