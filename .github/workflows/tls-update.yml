name: 📚 TLS 杂志自动化更新

on:
  schedule:
    # 比如：每周二、周五早上 8点 (UTC) 更新
    - cron: '0 8 * * 2,5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai markdown

      - name: Run TLS AI Update Script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python tls_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tls_ai_enhanced.xml
          git commit -m "Auto-update TLS AI feed" || exit 0
          git push
