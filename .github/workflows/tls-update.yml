name: 📚 TLS 杂志自动化更新

on:
  schedule:
    # 比如：每周二、周五早上 8点 (UTC) 更新
    - cron: '0 8 * * 2,5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai markdown

      - name: Run TLS AI Update Script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -u tls_rss.py  # 🚀 加上 -u，强制实时输出日志！

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 💡 魔法1：把精确指定文件名换成 `git add -A`（有啥变动就加啥，没变动就不加，绝不报错）
          git add -A
          # 💡 魔法2：如果 commit 发现没有任何文件需要提交，就温柔地打印一句话并正常退出，不要抛出红色的报错
          git commit -m "Auto-update TLS AI feed" || echo "🎉 本次运行没有产生新的数据，无需提交。"
          git push || echo "☁️ 没有需要推送到云端的更新。"
