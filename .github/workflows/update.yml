name: 📚 四大刊物 AI 精读引擎 (NYRB, LRB, TLS, NYT)

on:
  schedule:
    # 按照你习惯的频率：每周一、周四自动运行
    - cron: '0 8 * * 1,4' 
  workflow_dispatch: # 允许随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ⚠️ 确保 GitHub Actions 拥有推送代码的权限（新版 GitHub 仓库必备）
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 融合了你之前所需的 feedgen 和现在新增的 markdown 库
          pip install requests beautifulsoup4 feedgen openai markdown

      - name: Run Python scripts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 依次运行四大爬虫，加上 || true 防止某个网站宕机导致整个流程崩溃
          echo "==== 运行纽约书评 (NYRB) ===="
          python "nyrb_rss.py" || true
          
          echo "==== 运行伦敦书评 (LRB) ===="
          python "lrb_rss.py" || true
          
          echo "==== 运行泰晤士文学增刊 (TLS) ===="
          python "tls_rss.py" || true
          
          echo "==== 运行纽约时报书评 (NYT) ===="
         

      - name: Commit and push XML files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 📦 1. 只打包生成的 xml 文件，完全抛弃可能会报错的 txt 记录本
          git add *.xml
          
          # 🚀 2. 完美的单行判定逻辑：如果有新生成的 XML 内容，就自动打包推送！
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update 4 Magazines AI RSS feeds" && git push)
