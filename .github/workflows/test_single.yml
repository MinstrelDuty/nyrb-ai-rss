name: 🧪 Pre-flight Tests

on:
  workflow_dispatch: # 允许你在网页上手动点击运行测试

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests markdown openai beautifulsoup4

      - name: Run Crawler Test (NYT)
        env:
          # 这一行就是把 GitHub 金库里的秘密，赋值给环境变量 DEEPSEEK_API_KEY
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} 
        run: |
          python test_wayback_only.py
