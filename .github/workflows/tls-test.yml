name: TLS Cloud Test

on:
  workflow_dispatch: # 允许你手动点击运行

jobs:
  test_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 测试脚本很快，设置 10 分钟足够
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Cloud Test
        # 🚀 这里的 -u 保证日志实时刷新，你能看到 50 篇文章跳出来
        run: python -u tls_cloud_test.py
