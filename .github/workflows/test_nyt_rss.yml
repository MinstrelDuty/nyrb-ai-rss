name: 🧪 纽约时报连测 (10篇限量版)

on:
  # 纯手动触发，绝不在后台偷偷跑
  workflow_dispatch: 

jobs:
  run-nyt-test:
    runs-on: ubuntu-latest
    
    # ⚠️ 核心权限：必须给 Actions 机器人写入代码仓库的权限，否则它没法把生成的 XML 交给你
    permissions:
      contents: write

    steps:
      - name: 📥 获取最新仓库代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 3.10 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装核心依赖库
        run: |
          python -m pip install --upgrade pip
          # 注意：这次除了 requests 和 markdown，千万别忘了 openai
          pip install requests markdown openai

      - name: 🚀 运行 NYT 测试脚本 (抽取 10 篇)
        env:
          # 读取你在金库里存好的 DeepSeek 密钥
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 运行我们刚刚写好的测试脚本
          python test_nyt_rss.py

      - name: 💾 自动存档生成的 XML 文件
        run: |
          # 伪装成官方机器人进行代码提交
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 📦 极致纯净：只追踪刚才生成的 xml 文件
          git add *.xml || true
          
          # 🚀 单行静默判定逻辑：如果有新生成的 XML 内容就推送；如果没有变动，就安静休眠绝不报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Test] Auto-update NYT RSS feed" && git push)
