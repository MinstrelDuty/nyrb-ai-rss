name: NYRB AI RSS Generator

on:
  schedule:
    - cron: '0 8 * * 1,4'  
  workflow_dispatch:       

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 🚀 核心修改：安装了 openai 库
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser markdown feedgen openai

      - name: Run Python script
        # 🚀 核心修改：把环境变量改成了 DEEPSEEK_API_KEY
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python "nyrbrss.py"
          python "lrb_rss.py"

      - name: Commit and push XML file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add nyrb_ai_enhanced.xml
          if git diff --staged --quiet; then
            echo "没有新内容，无需提交。"
          else
            git commit -m "Auto-update NYRB RSS (DeepSeek) [skip ci]"
            git pull --rebase -X theirs origin main
            git push
          fi
