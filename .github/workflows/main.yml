name: 📚 传统三大刊 (NYRB, LRB, TLS)

on:
  schedule:
    - cron: '0 8 * * 1,4' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedgen openai markdown

      - name: Run Python scripts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python "nyrb_rss.py" || true
          python "lrb_rss.py" || true
          python "tls_rss.py" || true

      - name: Commit and push XML files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update 3 Magazines AI RSS feeds" && git push)
