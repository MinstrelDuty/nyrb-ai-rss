name: NYRB AI RSS Generator

on:
  schedule:
    - cron: '0 8 * * 1,4'  # 每周一和周四自动运行
  workflow_dispatch:       # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser markdown feedgen google-generativeai

      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python "nyrbrss.py"

      - name: Commit and push XML file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add nyrb_ai_enhanced.xml
          if git diff --staged --quiet; then
            echo "没有新内容，无需提交。"
          else
            git commit -m "Auto-update NYRB RSS [skip ci]"
            git pull --rebase -X theirs origin main
            git push
          fi
