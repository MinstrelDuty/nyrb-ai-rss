name: 🧪 炼丹与爬虫测试 (NYT & AI)

# 这里的 workflow_dispatch 意味着它不会定时跑，只能由你在网页端手动点击运行
on:
  workflow_dispatch: 

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 获取代码
        uses: actions/checkout@v3

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装测试依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 运行测试脚本一：检查纽约时报 RSS 是否畅通
      - name: 🕷️ 运行 NYT 爬虫测试
        run: python test_nyt_crawler.py

      # 运行测试脚本二：测试大模型提示词是否输出规范格式
      - name: 🧠 运行提示词炼丹测试
        env:
          # 从你的 Secrets 中提取 API Key 供测试使用
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python test_real_nyt_prompt.py
