<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书评深度集萃 - AI 精读版</title>
    <style>
        /* --- 全局与容器（解决宽窄不齐的核心） --- */
        body { 
            background-color: #f4f5f7; 
            color: #333; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.8; 
            margin: 0; 
            padding: 30px 0; 
        }

        /* 终极闸门：死死锁定 800px，对齐所有模块 */
        .container { 
            max-width: 800px !important; 
            margin: 0 auto !important; 
            width: 92%; 
            box-sizing: border-box !important; 
        }

        /* --- 顶部页眉 --- */
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 40px 20px; 
            background: #fff; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box !important;
        }

        .header h1 { margin: 0; font-size: 28px; color: #111; }
        .tabs { margin-top: 15px; }
        .tab-btn {
            background: #eee; border: none; padding: 6px 15px; margin: 0 5px;
            border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold;
        }
        .tab-btn.active { background: #111; color: #fff; }

        /* --- 文章列表与卡片 --- */
        .article-list { width: 100%; display: block; }

        /* 修复过宽问题：强制 Padding 向内挤压 */
        .article-card {
            background: #fff;
            border-radius: 12px;
            padding: 35px 30px; 
            margin-bottom: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            width: 100% !important; 
            box-sizing: border-box !important; /* 核心修复属性 */
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* --- 内容排版优化 --- */
        .article-card h2 { font-size: 22px; margin-top: 0; color: #111; line-height: 1.4; }
        .article-card p { margin: 10px 0; color: #444; }
        .article-card img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
        
        .loading { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <h1>📚 书评深度集萃</h1>
            <div class="tabs" id="feed-tabs">
                <button class="tab-btn active" data-xml="tls_ai_enhanced.xml">TLS (泰晤士)</button>
                <button class="tab-btn" data-xml="lrb_ai_enhanced.xml">LRB (伦敦)</button>
                <button class="tab-btn" data-xml="nyrb_ai_enhanced.xml">NYRB (纽约)</button>
            </div>
            <p style="color: #888; margin-top: 15px; font-size: 14px;" id="status-text">
                正在加载最新 AI 精读报告...
            </p>
        </header>

        <!-- 动态解析渲染区域 -->
        <main class="article-list" id="content-area">
            <div class="loading">解析 XML 库中...</div>
        </main>
    </div>

    <script>
        // 初始化时加载 TLS 的 XML
        document.addEventListener('DOMContentLoaded', () => {
            loadFeed('tls_ai_enhanced.xml');
            
            // 绑定切换按钮点击事件
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const xmlFile = e.target.getAttribute('data-xml');
                    loadFeed(xmlFile);
                });
            });
        });

        // 核心：读取 GitHub 库里的 XML 文件并渲染
        async function loadFeed(xmlFileName) {
            const contentArea = document.getElementById('content-area');
            const statusText = document.getElementById('status-text');
            contentArea.innerHTML = '<div class="loading">正在获取 ' + xmlFileName + '...</div>';

            try {
                // 请求同一目录下的 XML 文件 (依赖你的 GitHub Pages 目录结构)
                const response = await fetch(xmlFileName + '?t=' + new Date().getTime()); // 加时间戳防缓存
                if (!response.ok) throw new Error('XML 文件未找到');
                
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                // 解析 RSS 格式的 <item> 标签
                const items = xmlDoc.querySelectorAll("item");
                statusText.innerText = `当前栏目共收录 ${items.length} 篇精读`;
                contentArea.innerHTML = '';

                if (items.length === 0) {
                    contentArea.innerHTML = '<div class="loading">暂无数据。</div>';
                    return;
                }

                // 循环生成文章卡片
                items.forEach(item => {
                    const title = item.querySelector("title") ? item.querySelector("title").textContent : "无标题";
                    const link = item.querySelector("link") ? item.querySelector("link").textContent : "#";
                    
                    // 获取 AI 生成的摘要 (通常存放在 description 或 content:encoded 中)
                    let description = "";
                    const contentEncoded = item.querySelector("encoded"); // 处理 <content:encoded>
                    const descNode = item.querySelector("description");
                    
                    if (contentEncoded) {
                        description = contentEncoded.textContent;
                    } else if (descNode) {
                        description = descNode.textContent;
                    }

                    // 构造 HTML，由于上面写死了 .article-card 的 box-sizing，这里渲染出来宽度绝对一致
                    const articleHTML = `
                        <article class="article-card">
                            <h2><a href="${link}" target="_blank" style="color: inherit; text-decoration: none;">${title}</a></h2>
                            <div class="article-content">
                                ${description}
                            </div>
                            <div style="margin-top: 20px;">
                                <a href="${link}" target="_blank" style="color: #3498db; text-decoration: none; font-size: 14px;">🔗 阅读全文</a>
                            </div>
                        </article>
                    `;
                    contentArea.innerHTML += articleHTML;
                });

            } catch (error) {
                console.error("加载 XML 失败:", error);
                contentArea.innerHTML = `<div class="loading" style="color: red;">获取内容失败。请确认 ${xmlFileName} 已成功推送到 GitHub 且路径正确。</div>`;
            }
        }
    </script>
</body>
</html>
