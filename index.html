
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLS 书评深度集萃 - 精读报告</title>
    <style>
        /* --- 核心样式重置 --- */
        body { 
            background-color: #f4f5f7; 
            color: #333; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.8; 
            margin: 0; 
            padding: 20px 0; /* 侧边距由 container 统一控制 */
        }

        /* --- 宽度锁定闸门：解决宽窄不一的关键 --- */
        .container { 
            max-width: 800px !important; /* 强制锁定宽度，绝不让文章框变宽 */
            margin: 0 auto !important; 
            width: 95%; /* 适配移动端 */
            box-sizing: border-box !important; 
        }

        /* --- 顶部白色页眉 --- */
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 40px 20px; 
            background: #fff; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box !important;
        }

        .header h1 { 
            margin: 0; 
            font-size: 28px; 
            letter-spacing: -0.5px;
        }

        .source-tag {
            display: inline-block;
            background: #1a1a1a;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 600;
        }

        /* --- 文章列表与卡片 --- */
        .article-list { 
            width: 100%; 
        }

        .article-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px; 
            margin-bottom: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            width: 100% !important; /* 必须 100%，它会受父级 container 800px 限制 */
            box-sizing: border-box !important; /* 核心：让 padding 向内缩，防止撑宽 */
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* --- AI 总结内部的引用与文本 --- */
        .summary-box {
            border-left: 4px solid #e74c3c;
            padding: 12px 20px;
            margin: 20px 0;
            background: #fff8f8;
            border-radius: 0 8px 8px 0;
        }

        h2 { font-size: 20px; margin-top: 0; color: #111; }
        h3 { font-size: 17px; color: #444; margin-bottom: 10px; }
        p { margin: 10px 0; }
        
        .author-meta { 
            color: #777; 
            font-size: 14px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }

        .original-link {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            font-size: 13px;
        }
        .original-link:hover { text-decoration: underline; }

        /* 响应式微调 */
        @media (max-width: 600px) {
            .header { padding: 30px 15px; }
            .article-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <h1>📚 书评深度集萃</h1>
            <div class="source-tag">泰晤士报文学增刊 (The TLS)</div>
            <p style="color: #888; margin-top: 15px; font-size: 14px;">
                2026年4月30日刊 · 全自动 AI 深度精读
            </p>
        </header>

        <!-- 文章列表区域 -->
        <main class="article-list">
            
            <!-- 这里是一个演示卡片，你的 Python 脚本会将循环生成的卡片放在这里 -->
            <article class="article-card">
                <h2>【示例】论布莱希特：杂耍暴力与冷峻寓言</h2>
                <div class="author-meta">✍️ 作者：约瑟夫 · 罗宾逊 | 🎯 对象：舞台剧《阿图罗 · 魏的崛起》</div>
                <div class="summary-box">
                    <strong>一句话破题：</strong>一场关于权力如何在闹剧阴影下登台的深刻警示。
                </div>
                <h3>📰 核心脉络</h3>
                <p>这里是精读报告的正文内容。由于使用了 border-box 盒模型，无论正文多长，卡片的宽度都会死死锁定在 800px，绝不会比顶部的 Header 盒子宽。</p>
                <a href="#" class="original-link">🔗 阅读原刊全文</a>
            </article>

            <!-- 更多的 <article class="article-card"> 将在此处动态插入 -->

        </main>
    </div>

</body>
</html>
