<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>AI 深度精读杂志架</title>
    <style>
        body { background-color: #f4f5f7; color: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.8; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: transparent; padding: 0; }
        .header { text-align: center; margin-bottom: 30px; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { font-size: 32px; color: #111; margin-bottom: 10px; font-weight: 800; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav-btn { background: #f0f2f5; border: none; padding: 10px 25px; border-radius: 30px; font-size: 16px; color: #555; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .nav-btn:hover { background: #e4e6eb; }
        .nav-btn.active { background: #111; color: #fff; }

        /* 🚀 核心 UI 升级：折叠卡片样式 */
        .article-card { background: #fff; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; transition: box-shadow 0.3s; }
        .article-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        
        .article-header { padding: 20px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #fff; transition: background 0.2s; }
        .article-header:hover { background: #fafafa; }
        .article-title-wrap { flex: 1; padding-right: 20px; }
        .article-title { font-size: 20px; color: #1a1a1a; margin: 0 0 5px 0; font-weight: bold; line-height: 1.4; }
        .article-meta { font-size: 13px; color: #888; display: flex; gap: 15px; }
        .article-meta a { color: #0366d6; text-decoration: none; }
        .article-meta a:hover { text-decoration: underline; }
        
        .toggle-icon { font-size: 20px; color: #bbb; transition: transform 0.3s ease; }
        .article-card.open .toggle-icon { transform: rotate(180deg); }

        .article-body { padding: 0 25px 30px 25px; display: none; border-top: 1px solid #eee; margin-top: 15px; padding-top: 20px; }
        
        .article-content { font-size: 16px; color: #333; }
        .article-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px auto; display: block; object-fit: cover; }
        .article-content h2, .article-content h3 { color: #111; margin-top: 25px; margin-bottom: 10px; font-size: 18px; }
        .loading { text-align: center; font-size: 16px; color: #888; padding: 50px; background: #fff; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 AI 深度精读杂志架</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="loadFeed('nyrb_ai_enhanced.xml', this)">纽约书评</button>
                <button class="nav-btn" onclick="loadFeed('lrb_ai_enhanced.xml', this)">伦敦书评</button>
            </div>
        </div>

        <div id="content" class="loading">点击上方按钮加载内容... 🚀</div>
    </div>

    <script>
        function toggleCard(headerElement) {
            const card = headerElement.parentElement;
            const body = card.querySelector('.article-body');
            
            if (card.classList.contains('open')) {
                body.style.display = 'none';
                card.classList.remove('open');
            } else {
                body.style.display = 'block';
                card.classList.add('open');
            }
        }

        function loadFeed(xmlFile, btnElement) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const contentDiv = document.getElementById("content");
            contentDiv.innerHTML = "<div class='loading'>正在解码数据中... ⏳</div>";

            fetch(xmlFile + '?t=' + new Date().getTime())
                .then(response => response.text())
                .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
                .then(data => {
                    const items = data.querySelectorAll("item");
                    if (items.length === 0) {
                        contentDiv.innerHTML = "<div class='loading' style='color:red;'>暂无文章或文件不存在。</div>";
                        return;
                    }
                    
                    let html = "";
                    items.forEach(item => {
                        const title = item.querySelector("title")?.textContent || "无标题";
                        const pubDate = item.querySelector("pubDate")?.textContent || "未知时间";
                        const link = item.querySelector("link")?.textContent || "#";
                        let contentNode = item.getElementsByTagNameNS("*", "encoded")[0];
                        let content = contentNode ? contentNode.textContent : (item.querySelector("description")?.textContent || "无正文");

                        // 格式化日期只保留年月日
                        const shortDate = new Date(pubDate).toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });

                        html += `
                            <div class="article-card">
                                <div class="article-header" onclick="toggleCard(this)">
                                    <div class="article-title-wrap">
                                        <h2 class="article-title">${title}</h2>
                                        <div class="article-meta">
                                            <span>📅 ${shortDate}</span>
                                            <span>🔗 <a href="${link}" target="_blank" onclick="event.stopPropagation();">阅读英文原版</a></span>
                                        </div>
                                    </div>
                                    <div class="toggle-icon">▼</div>
                                </div>
                                <div class="article-body">
                                    <div class="article-content">${content}</div>
                                </div>
                            </div>
                        `;
                    });
                    contentDiv.innerHTML = html;
                })
                .catch(error => {
                    contentDiv.innerHTML = `<div class='loading' style='color:red;'>加载失败，请检查网络或配置。</div>`;
                });
        }

        window.onload = () => loadFeed('nyrb_ai_enhanced.xml', document.querySelector('.nav-btn'));
    </script>
</body>
</html>
